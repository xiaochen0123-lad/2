<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>中国高铁有声相册</title>
  <style>
    body { font-family: "微软雅黑", Arial, sans-serif; background: #f2f2f2; margin: 0; }
    .album-container { max-width: 800px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 10px #ccc; padding: 30px; }
    h1 { text-align: center; color: #085097; }
    .photo-slide { margin-bottom: 35px; }
    .photo-slide img { width: 100%; border-radius: 6px; }
    .desc { font-size: 1.1em; margin: 10px 0 5px 0; color: #2d2d2d; }
    .audio-bar { width: 100%; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="album-container">
    <h1>中国高铁有声相册</h1>

    <div class="photo-slide">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/CRH380A-2824%2C_201907191113.jpg" alt="复兴号高铁" />
      <div class="desc">复兴号高速列车：代表中国高铁自主创新的最新成果，最高运营时速达350公里。</div>
      <audio class="audio-bar" controls>
        <source src="https://www.applauseaudio.com/demo-cn-hsr1.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
      </audio>
    </div>
    
    <div class="photo-slide">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/201707_CRH2G-Z_China_Railway.jpg" alt="高铁列车穿越大地" />
      <div class="desc">中国高速铁路总里程已达4万公里，覆盖绝大多数省区，实现东西南北互联互通。</div>
      <audio class="audio-bar" controls>
        <source src="https://www.applauseaudio.com/demo-cn-hsr2.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
      </audio>
    </div>

    <div class="photo-slide">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/CRH5_type_train_in_Beijing_20130128.jpg" alt="高铁站台" />
      <div class="desc">中国高铁站如同现代化航空港，乘坐高铁已成为国人的出行首选。</div>
      <audio class="audio-bar" controls>
        <source src="https://www.applauseaudio.com/demo-cn-hsr3.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
      </audio>
    </div>

    <p style="text-align:center;color:#888;">更多精彩内容，敬请期待！</p>
  </div>
</body>
</html>
